services:
  scheduler_backend:
    build:
      context: ../../..
      dockerfile: apps/scheduler/backend/Dockerfile
    container_name: scheduler_backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ../../../.env
    ports:
      - "27643:27643"
    environment:
      SCHEDULER_HOST: 0.0.0.0
      SCHEDULER_PORT: 27643
      SCHEDULER_RELOAD: 0
      SCHEDULER_WORKSPACE_ROOT: /app
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:27643/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler_frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: scheduler_frontend
    restart: unless-stopped
    depends_on:
      scheduler_backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
